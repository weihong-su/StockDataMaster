[pytest]
# ─── 测试发现 ────────────────────────────────────────────────────────────────
testpaths = test/suite
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ─── 输出格式 ────────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:cacheprovider

# ─── 自定义 marker ────────────────────────────────────────────────────────────
markers =
    unit: 单元测试，不需要网络连接
    integration: 集成测试，需要网络和外部服务
    slow: 执行时间较长的测试

# ─── 编码 ────────────────────────────────────────────────────────────────────
# Windows 下需要确保 UTF-8 输出
# 运行时使用: python -X utf8 -m pytest ...

# ─── 过滤 ────────────────────────────────────────────────────────────────────
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::PendingDeprecationWarning

# ─── 日志 ────────────────────────────────────────────────────────────────────
log_level = WARNING
log_cli = false
