name: Docs (MkDocs)

# 说明:
#   构建/部署默认全部 if:false 守门,不会真正运行。
#   当需要启用 GitHub Pages 部署时,把下面两个 if:false 改为 if:true(或删除该行)即可。

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/pages.yml'
      - 'CHANGELOG.md'
      - 'data_master.py'
      - 'config.py'
      - 'adapters/**'
      - 'cache/**'
      - 'health/**'
      - 'utils/**'
      - '__init__.py'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    if: false  # ← 守门:启用部署时改为 true 或删除此行
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt

      - name: Build MkDocs site
        run: mkdocs build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    if: false  # ← 守门:启用部署时改为 true 或删除此行
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
