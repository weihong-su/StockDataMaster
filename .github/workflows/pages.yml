name: Docs (MkDocs)

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/pages.yml'
      - 'CHANGELOG.md'
      - 'data_master.py'
      - 'config.py'
      - 'adapters/**'
      - 'cache/**'
      - 'health/**'
      - 'utils/**'
      - '__init__.py'
      - 'LICENSE'
      - 'NOTICE'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - '.env.example'
      - 'config.example.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install docs dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Build MkDocs site
        run: python -m mkdocs build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
